<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Dock</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">🎮 Gaming Dock</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Action</a>
        <a href="#">Racing</a>
        <a href="#">Adventure</a>
    </nav>
</header>

<section class="hero">
    <h1>Welcome to Gaming Dock</h1>
    <p>Your Gaming Hub</p>

    <input type="text" placeholder="Search Games...">
</section>

<section class="games">

<h2>Featured Games</h2>

<div class="card">
    <img src="https://via.placeholder.com/300x170">
    <h3>Game Name Here</h3>
    <p>Add your game description here.</p>
    <button>Download</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x170">
    <h3>Another Game</h3>
    <p>Add your game description here.</p>
    <button>Download</button>
</div>

</section>

<footer>
    <p>© 2026 Gaming Dock</p>
</footer>

</body>
</html>
